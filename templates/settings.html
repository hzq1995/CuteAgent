<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CuteHarness 设置</title>
    <link rel="icon" href="/static/pika.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="app-shell">
      {% include "_sidebar.html" %}
      <main class="page-pane">
        <section class="page-content">
          <div class="page-header">
            <p class="kicker">Settings</p>
            <h1>设置</h1>
          </div>
          {% if saved %}
            <p class="success-note">设置已保存。</p>
          {% endif %}
          <form class="panel-form" method="post" action="/settings">
            <label>
              <span>系统提示词</span>
              <textarea name="system_prompt" rows="12" placeholder="定义 CuteHarness 的角色、边界和工具使用策略。">{{ app_settings.system_prompt }}</textarea>
            </label>
            <div class="form-row two">
              <label>
                <span>Python 超时秒数</span>
                <input name="python_timeout_seconds" type="number" min="1" max="300" value="{{ app_settings.python_timeout_seconds }}">
              </label>
              <label>
                <span>最大工具轮数</span>
                <input name="max_tool_rounds" type="number" min="1" max="20" value="{{ app_settings.max_tool_rounds }}">
              </label>
            </div>
            <div class="form-actions">
              <button type="submit">保存设置</button>
            </div>
          </form>

          <section class="memory-section">
            <div class="page-header compact-header">
              <p class="kicker">Memory</p>
              <h2>记忆管理</h2>
            </div>
            {% if memories %}
              <div class="memory-list">
                {% for memory in memories %}
                  <article class="memory-row">
                    <div class="memory-meta">
                      <span>{{ memory.updated_at[:16].replace("T", " ") }}</span>
                      <code>{{ memory.id }}</code>
                    </div>
                    <form class="memory-form" method="post" action="/memories/{{ memory.id }}">
                      <textarea name="content" rows="2" required>{{ memory.content }}</textarea>
                      <button type="submit">保存</button>
                    </form>
                    <form class="memory-delete-form" method="post" action="/memories/{{ memory.id }}/delete">
                      <button class="danger-button" type="submit">删除</button>
                    </form>
                  </article>
                {% endfor %}
              </div>
            {% else %}
              <p class="muted">暂无记忆。AI 会在需要长期保存关键信息时通过工具新增记忆。</p>
            {% endif %}
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
